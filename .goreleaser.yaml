# GoReleaser v2 configuration for Sequoia
# https://goreleaser.com
version: 2

project_name: sequoia

builds:
  - id: sequoia
    main: ./cmd/sequoia/
    binary: sequoia
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/Crisbr10/sequoia/cmd/sequoia.Version={{.Version}}
    # Ensure go 1.24.2+ for the project
    goamd64: [v1]
    ignore:
      # Skip linux/arm64 on 386; not needed
      - goos: linux
        goarch: "386"
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

signs:
  - cmd: cosign
    args:
      - sign-blob
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - --yes
      - ${artifact}
    artifacts: all
    output: true

release:
  draft: true
  prerelease: auto
  header: |
    ## Sequoia {{ .Version }}
    
    Multi-agent code audit framework with Go CLI installer and TUI.
  footer: |
    **Install**
    
    ```bash
    # macOS / Linux
    curl -sSL https://raw.githubusercontent.com/Crisbr10/sequoia/main/scripts/install.sh | bash
    
    # Windows PowerShell
    irm https://raw.githubusercontent.com/Crisbr10/sequoia/main/scripts/install.ps1 | iex
    ```

changelog:
  use: github-native
  sort: desc
  groups:
    - title: "Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "Documentation"
      regexp: '^.*?docs(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: "Refactoring"
      regexp: '^.*?refactor(\([[:word:]]+\))??!?:.+$'
      order: 3
    - title: "Build / CI"
      regexp: '^.*?(build|ci)(\([[:word:]]+\))??!?:.+$'
      order: 4
    - title: "Tests"
      regexp: '^.*?test(\([[:word:]]+\))??!?:.+$'
      order: 5
    - title: "Chores"
      regexp: '^.*?chore(\([[:word:]]+\))??!?:.+$'
      order: 6
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^Merge branch"
      - "^Merge pull request"

brews:
  - name: sequoia
    description: |
      Multi-agent code audit framework with Go CLI installer and TUI.
      Deploy specialized AI agents to inspect projects from every angle
      in parallel.
    homepage: https://github.com/Crisbr10/sequoia
    license: MIT
    skip_upload: auto
    repository:
      owner: Crisbr10
      name: homebrew-sequoia
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    url_template: "https://github.com/Crisbr10/sequoia/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    commit_author:
      name: goreleaserbot
      email: goreleaser@crisbr.dev
    commit_msg_template: "Brew formula update for {{ .ProjectName }} {{ .Tag }}"
    directory: Formula
    install: |
      bin.install "sequoia"

scoops:
  - name: sequoia
    description: |
      Multi-agent code audit framework with Go CLI installer and TUI.
      Deploy specialized AI agents to inspect projects from every angle.
    homepage: https://github.com/Crisbr10/sequoia
    license: MIT
    skip_upload: auto
    repository:
      owner: Crisbr10
      name: scoop-sequoia
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    url_template: "https://github.com/Crisbr10/sequoia/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    commit_author:
      name: goreleaserbot
      email: goreleaser@crisbr.dev
    commit_msg_template: "Scoop update for {{ .ProjectName }} {{ .Tag }}"
    directory: bucket

universal_binaries:
  - id: sequoia-universal
    ids:
      - sequoia
    name_template: "{{ .ProjectName }}"
    replace: true
