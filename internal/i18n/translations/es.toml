# Spanish message catalog for Sequoia TUI.
# Keys use dot-notation: screen.element for scannability and collision prevention.
# Machine-translated Spanish — subject to human review.

# ─── Welcome Screen ───
[welcome]
menu_install = "Instalar"
menu_status = "Estado"
menu_uninstall = "Desinstalar"
menu_quit = "Salir"
subtitle = "Menú"
footer = "j/k ↑/↓: navegar  Enter: seleccionar  q: salir"

# ─── Tool Selection Screen ───
[tool_selection]
title = "Seleccionar Herramientas IA"
instruction = "Elige en qué herramientas de IA instalar Sequoia:"
empty = "(no se detectaron herramientas)"
selected_count = "{{.Selected}} de {{.Total}} herramientas seleccionadas"

# ─── Configuration Screen ───
[configuration]
title = "Configuración"
language_label = "Idioma"
language_en = "English"
language_es = "Español"
persistence_label = "Persistencia"
persistence_engram = "Engram"
persistence_files = "Archivos"
persistence_both = "Ambos"
engram_unavailable = "(no detectado)"

# ─── Install Progress Screen ───
[install_progress]
title_install = "Instalando"
title_uninstall = "Desinstalando"
summary_install = "Instalando {{.Completed}} de {{.Total}} herramientas..."
summary_uninstall = "Desinstalando {{.Completed}} de {{.Total}} herramientas..."

# ─── Complete Screen ───
[complete]
heading_install = "✅  ¡Instalación Completa!"
heading_uninstall = "✅  ¡Desinstalación Completa!"
heading_uninstall_warnings = "⚠️  Desinstalación Completada con Avisos — {{.Count}} herramienta(s) tuvieron problemas"
installed_items = "Instalado: Skills, Comandos, System Prompt"
warnings_note = "Algunos archivos no pudieron eliminarse — verifica los permisos e inténtalo de nuevo."
try_command = "Prueba ejecutando: sequoia status"

# ─── Error Screen ───
[error]
heading_install = "❌  Instalación Fallida"
heading_uninstall = "❌  Desinstalación Fallida"

# ─── Status Screen ───
[status]
title = "Estado"
empty = "No hay adaptadores registrados"

# ─── Uninstall Screen ───
[uninstall]
title = "Desinstalar"
empty = "Nada que desinstalar"
confirm_prompt = "¿Eliminar Sequoia de las herramientas seleccionadas?"
confirm_suffix = " [y/N]"

# ─── Common Validation Messages ───
[validation]
select_at_least_one = "Selecciona al menos una herramienta para continuar"
select_at_least_one_installed = "Selecciona al menos una herramienta instalada para continuar"

# ─── Default / Fallback ───
[default]
placeholder = "Sequoia TUI — pantalla no implementada aún"

# ─── Footer Hints (reusable across screens) ───
[footer]
navigate_keys = "↑/↓ j/k"
navigate = " navegar  "
toggle_key = "Space"
toggle = " alternar  "
confirm_key = "Enter"
confirm = " confirmar  "
back_key = "Esc"
back = " volver  "
quit_key = "q"
quit = " salir"
tab_key = "Tab"
switch_field = " cambiar campo  "
arrows_keys = "↑/↓/←/→"
change_option = " cambiar opción  "
status_screen_key = "r"
status_screen = " — Pantalla de Estado  "
retry_failed = " — Reintentar fallidos  "
back_to_tools = " — Volver a herramientas  "
quit_label = " — Salir"
update_key = "u"
update_label = " actualizar  "
reinstall_key = "r"
reinstall_label = " reinstalar  "
uninstall_key = "d"
uninstall_label = " desinstalar  "
