linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
formatters:
  enable:
    - gofmt
    - goimports
linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
          - "sayRepetitiveInsteadOfStutters"
issues:
  max-same-issues: 5
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: cmd/sequoia/main\.go
      linters:
        - errcheck
