name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Lint
        if: runner.os == 'Linux'
        uses: golangci/golangci-lint-action@v7
        with:
          version: v1

      - name: Test
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            go test -coverprofile=coverage.out -covermode=atomic ./... -count=1 -timeout 120s
          else
            go test -coverprofile=coverage.out -covermode=atomic ./... -count=1 -timeout 120s -race
          fi
        shell: bash

      - name: Upload coverage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.out

      - name: Build
        run: go build -o sequoia${{ matrix.os == 'windows-latest' && '.exe' || '' }} ./cmd/sequoia/

      - name: Install Smoke
        run: ./sequoia${{ matrix.os == 'windows-latest' && '.exe' || '' }} install --no-tui
        continue-on-error: true

      - name: Status Smoke
        run: ./sequoia${{ matrix.os == 'windows-latest' && '.exe' || '' }} status

      - name: Uninstall Smoke
        run: ./sequoia${{ matrix.os == 'windows-latest' && '.exe' || '' }} uninstall --all --yes
        continue-on-error: true
