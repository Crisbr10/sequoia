name: Sequoia Code Audit
description: >
  Run a Sequoia multi-agent code audit on your project. Sequoia inspects
  your codebase from multiple specialized angles: security, performance,
  architecture, quality, UX, and operations.
author: Sequoia
branding:
  icon: shield
  color: green

inputs:
  token:
    description: >
      GitHub token for posting PR comments and accessing the repository.
      Use ${{ secrets.GITHUB_TOKEN }}.
    required: true
    default: ${{ github.token }}
  fail-on:
    description: >
      Minimum severity that causes the action to fail.
      Options: critical, high, medium, low.
      Set to 'never' to never fail regardless of findings.
    required: false
    default: high
  sequoia-version:
    description: >
      Sequoia CLI version to download and use.
      Use 'latest' for the latest release.
    required: false
    default: latest
  working-directory:
    description: Directory to run the audit in (project root).
    required: false
    default: .

outputs:
  health-score:
    description: The overall project Health Score (0-100).
    value: ${{ steps.audit.outputs.health_score }}
  findings-count:
    description: Total number of findings across all agents.
    value: ${{ steps.audit.outputs.findings_count }}
  report-path:
    description: Path to the generated audit report artifact.
    value: ${{ steps.audit.outputs.report_path }}

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true

    - name: Download Sequoia CLI
      id: download
      shell: bash
      run: |
        set -euo pipefail

        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64|amd64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
          *) echo "Unsupported architecture: $ARCH"; exit 1 ;;
        esac

        if [ "$OS" = "darwin" ]; then OS="darwin"; fi
        if [ "$OS" = "linux" ]; then OS="linux"; fi

        # For Windows runners, download the Windows binary.
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          OS="windows"
          EXT=".exe"
        else
          EXT=""
        fi

        VERSION="${{ inputs.sequoia-version }}"
        if [ "$VERSION" = "latest" ]; then
          # Fallback: build from source if no binary is available.
          echo "Building sequoia from source (latest)..."
          cd "${{ github.action_path }}"
          go build -o sequoia${EXT} ./cmd/sequoia/
          echo "binary=${{ github.action_path }}/sequoia${EXT}" >> "$GITHUB_OUTPUT"
        else
          URL="https://github.com/Crisbr10/sequoia/releases/download/${VERSION}/sequoia_${OS}_${ARCH}${EXT}"
          curl -sSL -o sequoia${EXT} "$URL"
          chmod +x sequoia${EXT}
          echo "binary=$(pwd)/sequoia${EXT}" >> "$GITHUB_OUTPUT"
        fi

    - name: Run Sequoia Audit
      id: audit
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail

        BINARY="${{ steps.download.outputs.binary }}"
        REPORT="sequoia-report.txt"

        echo "=== Sequoia Status ==="
        "$BINARY" status | tee -a "$REPORT"

        echo "" | tee -a "$REPORT"
        echo "=== Sequoia Audit ===" | tee -a "$REPORT"
        echo "" | tee -a "$REPORT"

        # For v0.1.0: audit command is not yet implemented.
        # Run status as a stand-in. Once audit is implemented,
        # replace with: "$BINARY" audit --format=json
        "$BINARY" status 2>&1 | tee -a "$REPORT" || true

        echo "" | tee -a "$REPORT"
        echo "---" | tee -a "$REPORT"
        echo "Report generated by Sequoia v0.1.0" | tee -a "$REPORT"
        echo "Full audit support coming in v0.2.0" | tee -a "$REPORT"

        # Placeholder outputs for future audit support.
        echo "health_score=N/A" >> "$GITHUB_OUTPUT"
        echo "findings_count=0" >> "$GITHUB_OUTPUT"
        echo "report_path=${{ inputs.working-directory }}/$REPORT" >> "$GITHUB_OUTPUT"

    - name: Upload Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sequoia-audit-report
        path: ${{ inputs.working-directory }}/sequoia-report.txt
        retention-days: 30

    - name: Post PR Comment
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.token }}
        script: |
          const fs = require('fs');
          const path = require('path');

          const reportPath = path.join(
            '${{ inputs.working-directory }}',
            'sequoia-report.txt'
          );

          let reportBody;
          try {
            reportBody = fs.readFileSync(reportPath, 'utf8');
          } catch {
            reportBody = 'Sequoia audit report could not be read.';
          }

          const comment = [
            '## 🔍 Sequoia Audit Report',
            '',
            '```',
            reportBody.trim(),
            '```',
            '',
            '> ⚠️ Full multi-agent audit support is coming in v0.2.0.',
            '> For now, this report shows the installation status of',
            '> Sequoia across detected AI tools.',
          ].join('\n');

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: comment,
          });
